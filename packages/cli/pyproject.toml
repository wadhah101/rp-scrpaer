[project]
name = "rp-to-hevy-cli"
version = "0.1.0"
description = "CLI frontend for RP to STRONG workout data exporter"
requires-python = ">=3.12"
dependencies = [
  "click>=8.1",
  "pydantic>=2.12.5",
  "api-service",
  "cloudpathlib[s3,gs]",
  "embeddings[api]",
  "pydantic-ai-slim[openai]",
  "pyyaml>=6.0",
  "sqlalchemy>=2.0",
  "sqlalchemy-libsql",
  "ruamel-yaml>=0.19.1",
]

[project.scripts]
rp-to-hevy-cli = "rp_to_hevy_cli.__main__:cli"

[tool.ty.rules]
all = "error"

[tool.ty.environment]
python-version = "3.12"
root = ["src"]
