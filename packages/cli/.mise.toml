[env]
RP_APP_BASE_URL = "https://training.rpstrength.com/api"
HEVY_API_BASE_URL = "https://api.hevyapp.com"
RP_APP_VERSION = "1.1.13"
IMAGE_NAME = "rp-to-hevy-cli"

[tasks.build]
extends = "build"

[tasks.push]
extends = "push"

[tasks.scan-docker]
extends = "scan-docker"

[tasks.build-push]
extends = "build-push"

[tasks.cli]
description = "Run CLI"
run = "uv run python -m rp_to_hevy_cli"

[tasks.export-hevy-local]
env = { HEVY_API_KEY = { required = true } }
run = "uv run python -m rp_to_hevy_cli hevy export --type all -o exports/hevy/"

[tasks.export-hevy-s3]
env = { BUCKET_NAME = { required = true }, HEVY_API_KEY = { required = true } }
run = "uv run python -m rp_to_hevy_cli hevy export --type exercise-templates --output s3://$BUCKET_NAME/exports/exercises/hevy-exercises.json"

[tasks.export-rp-local]
run = "uv run python -m rp_to_hevy_cli rp export --type all --output exports/rp"

[tasks.export-rp-s3]
env = { BUCKET_NAME = { required = true } }
run = "uv run python -m rp_to_hevy_cli rp export --type all --output s3://$BUCKET_NAME/exports/exercises/rp-exercises.json"


[tasks.run-rp-similarity-search]
description = "Run similarity search on embedded exercises"
run = """
uv run python -m rp_to_hevy_cli embedding run-rp-similarity-search \
  --chroma-mode persistent \
  --exercise-output-dir "$MONOREPO_ROOT/data/embeddings/output" \
  --rp-path "$MONOREPO_ROOT/packages/cli/exports/rp/exercises.json" \
  --mappings-path "$MONOREPO_ROOT/data/muscle_group_mapping.json" \
  --metrics-output "$MONOREPO_ROOT/data/embeddings/metrics.yaml" \
  --ground-truths-dir "$MONOREPO_ROOT/data/embeddings/ground-truths" \
  --n-results 5
"""

[tasks.llm-judge]
description = "Use LLM to pick the best Hevy match for each RP exercise"
run = """
uv run python -m rp_to_hevy_cli embedding llm-judge \
  --api-base-url "https://openrouter.ai/api/v1" \
  --api-key "$OPENROUTER_API_KEY" \
  --api-model "google/gemini-3.1-pro-preview" \
  --input-dir "$MONOREPO_ROOT/data/embeddings/output" \
  --output "$MONOREPO_ROOT/data/embeddings/llm-matches.yaml" \
  --concurrency "50" \
  # --strict
"""

[tasks.llm-judge.env]
OPENROUTER_API_KEY = { required = true }

[tasks.port-rp-workout-to-hevy]
description = "Port RP workout data to Hevy format"
run = """
uv run python -m rp_to_hevy_cli port-rp-workout-to-hevy \
  --matches "$MONOREPO_ROOT/data/embeddings/llm-matches.yaml" \
  --start-date 2026-02-28 \
  --redis-url "$REDIS_URL"
"""

[tasks.port-rp-workout-to-hevy.env]
HEVY_API_KEY = { required = true }
TITLE_API_BASE_URL = "https://openrouter.ai/api/v1"
TITLE_API_KEY = "{{env.OPENROUTER_API_KEY}}"
TITLE_API_MODEL = "google/gemini-3-flash-preview"
REDIS_URL = "redis://127.0.0.1:6379"

[tasks.port-rp-workout-to-hevy-dry-run]
description = "Dry run: preview RP workouts that would be imported to Hevy"
run = """
uv run python -m rp_to_hevy_cli port-rp-workout-to-hevy \
  --matches "$MONOREPO_ROOT/data/embeddings/llm-matches.yaml" \
  --start-date 2026-01-01 \
  --dry-run \
  --redis-url "$REDIS_URL"
"""

[tasks.port-rp-workout-to-hevy-dry-run.env]
HEVY_API_KEY = { required = true }
TITLE_API_BASE_URL = "https://openrouter.ai/api/v1"
TITLE_API_KEY = "{{env.OPENROUTER_API_KEY}}"
TITLE_API_MODEL = "google/gemini-3-flash-preview"
REDIS_URL = "redis://127.0.0.1:6379"
