name: Lint
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-slim
    name: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Cache mise tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.local/share/mise
          key: mise-lint-${{ hashFiles('.mise.*.toml', '.miserc.toml') }}
          restore-keys: mise-lint-
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          cache: false
      - name: Run hk check
        run: hk check --all
        env:
          HK_JOBS: "1"
  generate-no-diff:
    runs-on: ubuntu-latest
    name: Assert no diff on generated files
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Cache mise tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.local/share/mise
          key: mise-generate-no-diff-${{ hashFiles('**/.mise.toml', '.mise.*.toml', '.miserc.toml') }}
          restore-keys: mise-generate-no-diff-
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          cache: false
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          working_directory: packages/api-service
          cache: false
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          working_directory: scripts/hevy-extract
          cache: false
      - name: Install Dependencies
        run: bun install
        working-directory: scripts/hevy-extract
      - name: mise generate
        run: mise "//...:generate-libs*"
      - name: fix formatting
        run: mise format
      - name: assert no diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Error: There are uncommitted changes after code generation. Please commit the changes and try again."
            git status
            exit 1
          else
            echo "Success: No uncommitted changes after code generation."
          fi
