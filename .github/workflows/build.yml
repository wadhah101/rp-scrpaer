name: Build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    name: build
    strategy:
      matrix:
        project: [cli]
    env:
      MISE_AUTO_INSTALL: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Cache mise tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.local/share/mise
          key: mise-build-${{ matrix.project }}-${{ hashFiles('**/.mise.toml', '.mise.*.toml', '.miserc.toml') }}
          restore-keys: mise-build-${{ matrix.project }}-
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          install: false
          cache: false
          version: 2026.3.0
      - name: Tailscale
        uses: tailscale/github-action@53acf823325fe9ca47f4cdaa951f90b4b0de5bb9 # v4.1.1
        with:
          authkey: ${{ secrets.TALSCALE_KEY }}
      - name: Check remote builder availability
        id: check-builder
        run: |
          ADDR="${{ secrets.REMOTE_BUILDER_ADDRESS }}"
          PORT="${{ secrets.REMOTE_BUILDER_PORT }}"
          if [ -n "$ADDR" ] && [ -n "$PORT" ] && \
             timeout 30 bash -c "cat < /dev/null > /dev/tcp/$ADDR/$PORT" 2>/dev/null; then
            echo "Remote builder reachable at $ADDR:$PORT"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Remote builder not available, falling back to local docker buildx"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup remote builder
        if: steps.check-builder.outputs.available == 'true'
        run: |
          docker buildx create \
            --name remote-builder \
            --driver remote \
            tcp://${{ secrets.REMOTE_BUILDER_ADDRESS }}:${{ secrets.REMOTE_BUILDER_PORT }}
          docker buildx use remote-builder
      - name: build
        run: mise //packages/${{ matrix.project }}:build
        env:
          GITHUB_TOKEN: ${{ github.token }}
